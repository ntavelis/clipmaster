name: Release

on:
  push:
    tags:
      - "v*"

env:
  WAILS_VERSION: v2.12.0

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Build
        run: |
          REVISION=$(git rev-parse --short HEAD)
          MODIFIED=$(git diff --quiet && echo false || echo true)
          wails build -tags webkit2_41 -platform linux/amd64 -ldflags "-X github.com/rhemvi/omaclip/foundation/vcs.Revision=${REVISION} -X github.com/rhemvi/omaclip/foundation/vcs.Modified=${MODIFIED}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: omaclip-linux-amd64
          path: build/bin/omaclip

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Build
        run: |
          REVISION=$(git rev-parse --short HEAD)
          MODIFIED=$(git diff --quiet && echo false || echo true)
          wails build -tags webkit2_41 -platform linux/arm64 -ldflags "-X github.com/rhemvi/omaclip/foundation/vcs.Revision=${REVISION} -X github.com/rhemvi/omaclip/foundation/vcs.Modified=${MODIFIED}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: omaclip-linux-arm64
          path: build/bin/omaclip

  build-darwin-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        run: |
          REVISION=$(git rev-parse --short HEAD)
          MODIFIED=$(git diff --quiet && echo false || echo true)
          wails build -platform darwin/amd64 -ldflags "-X github.com/rhemvi/omaclip/foundation/vcs.Revision=${REVISION} -X github.com/rhemvi/omaclip/foundation/vcs.Modified=${MODIFIED}"

      - name: Zip .app bundle
        run: cd build/bin && zip -r omaclip-darwin-amd64.zip omaclip.app

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: omaclip-darwin-amd64-bin
          path: build/bin/omaclip.app/Contents/MacOS/omaclip

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: omaclip-darwin-amd64-app
          path: build/bin/omaclip-darwin-amd64.zip

  build-darwin-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        run: |
          REVISION=$(git rev-parse --short HEAD)
          MODIFIED=$(git diff --quiet && echo false || echo true)
          wails build -platform darwin/arm64 -ldflags "-X github.com/rhemvi/omaclip/foundation/vcs.Revision=${REVISION} -X github.com/rhemvi/omaclip/foundation/vcs.Modified=${MODIFIED}"

      - name: Zip .app bundle
        run: cd build/bin && zip -r omaclip-darwin-arm64.zip omaclip.app

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: omaclip-darwin-arm64-bin
          path: build/bin/omaclip.app/Contents/MacOS/omaclip

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: omaclip-darwin-arm64-app
          path: build/bin/omaclip-darwin-arm64.zip

  release:
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-darwin-amd64
      - build-darwin-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p dist/out
          cp dist/omaclip-linux-amd64/omaclip       dist/out/omaclip-linux-amd64
          cp dist/omaclip-linux-arm64/omaclip       dist/out/omaclip-linux-arm64
          cp dist/omaclip-darwin-amd64-bin/omaclip  dist/out/omaclip-darwin-amd64
          cp dist/omaclip-darwin-arm64-bin/omaclip  dist/out/omaclip-darwin-arm64
          cp dist/omaclip-darwin-amd64-app/omaclip-darwin-amd64.zip dist/out/omaclip-darwin-amd64.zip
          cp dist/omaclip-darwin-arm64-app/omaclip-darwin-arm64.zip dist/out/omaclip-darwin-arm64.zip
          chmod +x dist/out/omaclip-linux-amd64 dist/out/omaclip-linux-arm64 \
                    dist/out/omaclip-darwin-amd64 dist/out/omaclip-darwin-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/out/omaclip-linux-amd64
            dist/out/omaclip-linux-arm64
            dist/out/omaclip-darwin-amd64
            dist/out/omaclip-darwin-arm64
            dist/out/omaclip-darwin-amd64.zip
            dist/out/omaclip-darwin-arm64.zip
            build/appicon.png
