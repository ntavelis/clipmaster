version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        - os.Remove
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
